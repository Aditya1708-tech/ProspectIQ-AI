name: Build and Push Docker Images
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build backend container
      run: |
        docker build -f deployment/docker/backend.Dockerfile -t prospectiq-backend:latest .
        
    - name: Build frontend container
      run: |
        docker build -f deployment/docker/frontend.Dockerfile -t prospectiq-frontend:latest .
        
    - name: Build AI service container
      run: |
        docker build -f deployment/docker/ai-service.Dockerfile -t prospectiq-ai-service:latest .
